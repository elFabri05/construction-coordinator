name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: construct
          POSTGRES_PASSWORD: construct
          POSTGRES_DB: construct
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U construct"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://construct:construct@localhost:5432/construct
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      REDIS_URL: redis://localhost:6379
      # Presigning is computed locally, so dummy credentials are enough for
      # the e2e suite — no real bucket is touched in CI.
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: auto
      S3_BUCKET: construct-coordinator-test
      S3_ACCESS_KEY_ID: ci-access-key
      S3_SECRET_ACCESS_KEY: ci-secret-key
      S3_FORCE_PATH_STYLE: 'true'

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from "packageManager" in the root package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Run e2e tests
        run: pnpm --filter api test:e2e

      # Realtime gateway room-join + role-filter logic (fully mocked).
      - name: Run api unit tests
        run: pnpm --filter api test

      # Fully mocked (no Claude/Redis/DB) — safe without services.
      - name: Run ai-worker unit tests
        run: pnpm --filter ai-worker test
