name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: construct
          POSTGRES_PASSWORD: construct
          POSTGRES_DB: construct
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U construct"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://construct:construct@localhost:5432/construct
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from "packageManager" in the root package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Run e2e tests
        run: pnpm --filter api test:e2e
